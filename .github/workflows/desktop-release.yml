name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ChoiceForge ${{ github.ref_name }}"
          releaseBody: |
            Desktop builds of ChoiceForge ${{ github.ref_name }}.

            **Installers**:
            - **macOS** — `.dmg` (universal: Intel + Apple Silicon)
            - **Windows** — `.msi` (x64)

            Open the `.dmg` and drag ChoiceForge to Applications, or run the `.msi` on Windows.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new.

            > First-launch security prompt: this is an unsigned build. macOS users may need to right-click → Open the first time; Windows SmartScreen may ask you to confirm. Signing certificates are not yet set up.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
