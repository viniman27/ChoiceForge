name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ChoiceForge ${{ github.ref_name }}"
          releaseBody: |
            Desktop builds of ChoiceForge ${{ github.ref_name }}.

            **Installers**:
            - **macOS** — `.dmg` (universal: Intel + Apple Silicon)
            - **Windows** — `.msi` (x64)

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what's new.

            ---

            ### Installing on macOS

            1. Open the `.dmg` and drag **ChoiceForge** to **Applications**.
            2. First launch is blocked by Gatekeeper because this build isn't code-signed. **Right-click → Open is not enough on macOS 15+.** Use one of:
               - **System Settings → Privacy & Security → "Open Anyway"** after the block dialog appears, or
               - Terminal: `xattr -dr com.apple.quarantine /Applications/ChoiceForge.app`
            3. After the first open, macOS remembers your choice.

            ### Installing on Windows

            1. Run the `.msi`. Windows SmartScreen blocks unsigned installers — click **More info → Run anyway**.
            2. Subsequent launches work normally.

            > Code-signing certificates aren't set up yet (Apple Developer + Authenticode). The prompts above are part of the install flow until that's funded.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
