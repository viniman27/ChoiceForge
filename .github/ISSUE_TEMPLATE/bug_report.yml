name: Bug report
description: Something in ChoiceForge doesn't work the way you expect.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: When I clicked X, Y happened instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Ideally start from `New Project → Load Example`.
      placeholder: |
        1. Open ChoiceForge.
        2. New Project → Load Example.
        3. Click ...
        4. See bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include any error message, console output, or screenshot. If a generated `.zip` is relevant, attach it.
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser + OS + Node version, e.g. "Firefox 132 / macOS 14.5 / Node 24.15.0".
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Links, related issues, ChoiceScript runtime errors, etc.
